name: Publish to npm

# Publishes @gamercc-apps/mockscreenshots-mcp when you push a version tag.
# Update flow:  npm version patch  &&  git push --follow-tags
# Needs repo secret NPM_TOKEN = a stravanama Automation token (bypasses 2FA).

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
